name: Update Providers List

on:
  workflow_dispatch:  # Allow manual triggering only

jobs:
  update-providers:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch and update providers list
        run: |
          cat > fetch-providers.js << 'EOF'
          const https = require('https');
          const fs = require('fs');

          // Fetch the lego DNS page
          https.get('https://go-acme.github.io/lego/dns/index.html', (res) => {
            let data = '';
            
            res.on('data', (chunk) => {
              data += chunk;
            });
            
            res.on('end', () => {
              // Extract the table content
              const tableMatch = data.match(/<table[^>]*>[\s\S]*?<\/table>/);
              if (!tableMatch) {
                console.error('No table found in the page');
                process.exit(1);
              }
              
              // Extract all code elements from the table
              const codeMatches = [...tableMatch[0].matchAll(/<code>([^<]+)<\/code>/g)];
              const providers = codeMatches.map(m => m[1]);
              
              if (providers.length === 0) {
                console.error('No providers found in table');
                process.exit(1);
              }

              console.log('Found providers:', providers);

              // Format providers using the split function
              const split = (values, width) => {
                const stack = values.reverse();
                let result = '';
                let line = [];
                
                while (stack.length > 0) {
                  const item = '`' + stack.pop() + '`';
                  
                  if (line.join(',').length + item.length > (width - 1)) {
                    result = result + line.join(',') + ',<br/>';
                    line = [item];
                  } else {
                    line.push(item);
                  }
                }
                if (line.length) {
                  result = result + line.join(',');
                }
                return result;
              };

              const formatted = split(providers, 58);
              console.log('Formatted result:', formatted);
              fs.writeFileSync('providers-list.txt', formatted, 'utf8');
            });
          }).on('error', (err) => {
            console.error('Failed to fetch page:', err);
            process.exit(1);
          });
          EOF
          
          node fetch-providers.js

      - name: Update README
        run: |
          cat providers-list.txt
          
          python3 << 'PYTHON'
          import re
          
          with open('README.md', 'r') as f:
              content = f.read()
          
          providers_list = open('providers-list.txt', 'r').read().strip()
          
          print("Current README PROVIDER row:")
          provider_row = re.search(r'\| `PROVIDER` \|.*?\n\|', content)
          if provider_row:
              print(provider_row.group(0)[:200])
          
          # Find and replace the provider list in the PROVIDER table row
          # The pattern captures the text before the provider list and the line after
          pattern = r'(\| `PROVIDER` \| `""` \| DNS Provider\. Valid values are:<br/>)[^|]*(?=\|)'
          
          # Check if pattern matches
          if re.search(pattern, content):
              print("Pattern FOUND - performing replacement")
              updated = re.sub(pattern, r'\1' + providers_list, content)
          else:
              print("Pattern NOT FOUND - trying alternative approach")
              # Alternative: look for Valid values are and everything until the next row
              pattern2 = r'(Valid values are:<br/>)[^<|]*(<br/>)'
              if re.search(pattern2, content):
                  print("Alternative pattern FOUND")
                  updated = re.sub(pattern2, r'\1' + providers_list + r'\2', content)
              else:
                  print("Alternative pattern also NOT FOUND")
                  updated = content
          
          with open('README.md', 'w') as f:
              f.write(updated)
          
          print("README update complete")
          PYTHON

      - name: Check if changes exist
        id: changes
        run: |
          if git diff --quiet README.md; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "No changes detected"
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "Changes detected:"
            git diff README.md | head -30
          fi

      - name: Create Pull Request
        if: steps.changes.outputs.has_changes == 'true'
        uses: peter-evans/create-pull-request@v5
        with:
          commit-message: 'chore: update providers list from lego'
          title: 'chore: update DNS providers list'
          body: |
            Automated update of the DNS providers list from [lego documentation](https://go-acme.github.io/lego/dns/index.html).
            
            This PR was generated automatically by the update-providers workflow.
          branch: chore/update-providers
          delete-branch: true
